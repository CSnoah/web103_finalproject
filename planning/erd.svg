<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Helvetica, Arial, sans-serif">
  <rect width="1100" height="820" fill="#ffffff"/>
  <text x="550" y="34" font-size="22" font-weight="bold" fill="#222" text-anchor="middle">EatRite — Entity Relationship Diagram</text>

  <!-- Legend -->
  <rect x="20" y="50" width="300" height="70" rx="6" fill="#fafafa" stroke="#999"/>
  <text x="35" y="72" font-size="12" fill="#333">PK = Primary Key   •   FK = Foreign Key</text>
  <text x="35" y="92" font-size="12" fill="#333">─── one-to-many (1 ── ∞)</text>
  <text x="35" y="110" font-size="12" fill="#666">Join tables resolve many-to-many links</text>

  <!-- ================= USERS ================= -->
  <g>
    <rect x="60" y="180" width="230" height="150" rx="6" fill="#eef4ff" stroke="#2b5fb0" stroke-width="1.5"/>
    <rect x="60" y="180" width="230" height="28" rx="6" fill="#2b5fb0"/>
    <text x="175" y="199" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">users</text>
    <text x="72" y="228" font-size="12" fill="#222" font-weight="bold">id  (PK)</text>
    <text x="72" y="248" font-size="12" fill="#333">name</text>
    <text x="72" y="268" font-size="12" fill="#333">email</text>
    <text x="72" y="288" font-size="12" fill="#333">password_hash</text>
    <text x="72" y="308" font-size="12" fill="#333">dietary_preferences</text>
  </g>

  <!-- ================= INGREDIENTS ================= -->
  <g>
    <rect x="810" y="180" width="230" height="150" rx="6" fill="#eefaf0" stroke="#2e8b57" stroke-width="1.5"/>
    <rect x="810" y="180" width="230" height="28" rx="6" fill="#2e8b57"/>
    <text x="925" y="199" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">ingredients</text>
    <text x="822" y="228" font-size="12" fill="#222" font-weight="bold">id  (PK)</text>
    <text x="822" y="248" font-size="12" fill="#333">name</text>
    <text x="822" y="268" font-size="12" fill="#333">category</text>
    <text x="822" y="288" font-size="12" fill="#333">calories</text>
    <text x="822" y="308" font-size="12" fill="#333">dietary_tags</text>
  </g>

  <!-- ================= RECIPES ================= -->
  <g>
    <rect x="435" y="560" width="230" height="170" rx="6" fill="#fff4e8" stroke="#c47a17" stroke-width="1.5"/>
    <rect x="435" y="560" width="230" height="28" rx="6" fill="#c47a17"/>
    <text x="550" y="579" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">recipes</text>
    <text x="447" y="608" font-size="12" fill="#222" font-weight="bold">id  (PK)</text>
    <text x="447" y="628" font-size="12" fill="#333">title</text>
    <text x="447" y="648" font-size="12" fill="#333">description</text>
    <text x="447" y="668" font-size="12" fill="#333">instructions</text>
    <text x="447" y="688" font-size="12" fill="#333">image_url</text>
    <text x="447" y="708" font-size="12" fill="#333">avg_rating</text>
  </g>

  <!-- ================= JOIN: kitchen ================= -->
  <g>
    <rect x="435" y="150" width="230" height="120" rx="6" fill="#f5f0fa" stroke="#7a4fb0" stroke-width="1.5"/>
    <rect x="435" y="150" width="230" height="28" rx="6" fill="#7a4fb0"/>
    <text x="550" y="169" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">kitchen  (join)</text>
    <text x="447" y="197" font-size="12" fill="#222" font-weight="bold">id  (PK)</text>
    <text x="447" y="216" font-size="12" fill="#333">user_id  (FK)</text>
    <text x="447" y="235" font-size="12" fill="#333">ingredient_id  (FK)</text>
    <text x="447" y="254" font-size="12" fill="#333">quantity · unit</text>
  </g>

  <!-- ================= JOIN: recipe_ingredients ================= -->
  <g>
    <rect x="810" y="560" width="240" height="120" rx="6" fill="#f5f0fa" stroke="#7a4fb0" stroke-width="1.5"/>
    <rect x="810" y="560" width="240" height="28" rx="6" fill="#7a4fb0"/>
    <text x="930" y="579" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">recipe_ingredients  (join)</text>
    <text x="822" y="607" font-size="12" fill="#222" font-weight="bold">id  (PK)</text>
    <text x="822" y="626" font-size="12" fill="#333">recipe_id  (FK)</text>
    <text x="822" y="645" font-size="12" fill="#333">ingredient_id  (FK)</text>
    <text x="822" y="664" font-size="12" fill="#333">quantity · unit</text>
  </g>

  <!-- ================= JOIN: favorites ================= -->
  <g>
    <rect x="60" y="430" width="210" height="100" rx="6" fill="#f5f0fa" stroke="#7a4fb0" stroke-width="1.5"/>
    <rect x="60" y="430" width="210" height="28" rx="6" fill="#7a4fb0"/>
    <text x="165" y="449" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">favorites  (join)</text>
    <text x="72" y="477" font-size="12" fill="#222" font-weight="bold">id  (PK)</text>
    <text x="72" y="496" font-size="12" fill="#333">user_id  (FK)</text>
    <text x="72" y="515" font-size="12" fill="#333">recipe_id  (FK)</text>
  </g>

  <!-- ================= JOIN: ratings ================= -->
  <g>
    <rect x="60" y="580" width="210" height="115" rx="6" fill="#f5f0fa" stroke="#7a4fb0" stroke-width="1.5"/>
    <rect x="60" y="580" width="210" height="28" rx="6" fill="#7a4fb0"/>
    <text x="165" y="599" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">ratings  (join)</text>
    <text x="72" y="627" font-size="12" fill="#222" font-weight="bold">id  (PK)</text>
    <text x="72" y="646" font-size="12" fill="#333">user_id  (FK)</text>
    <text x="72" y="665" font-size="12" fill="#333">recipe_id  (FK)</text>
    <text x="72" y="684" font-size="12" fill="#333">stars</text>
  </g>

  <!-- ================= JOIN: scheduled_meals ================= -->
  <g>
    <rect x="290" y="720" width="230" height="80" rx="6" fill="#f5f0fa" stroke="#7a4fb0" stroke-width="1.5"/>
    <rect x="290" y="720" width="230" height="28" rx="6" fill="#7a4fb0"/>
    <text x="405" y="739" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">scheduled_meals  (join)</text>
    <text x="302" y="766" font-size="11" fill="#333">id (PK) · user_id (FK) · recipe_id (FK)</text>
    <text x="302" y="784" font-size="11" fill="#333">date · meal_type</text>
  </g>

  <!-- ================= RELATIONSHIP LINES ================= -->
  <g stroke="#555" stroke-width="1.5" fill="none">
    <!-- users -> kitchen -->
    <path d="M290 220 L435 200"/>
    <!-- kitchen -> ingredients -->
    <path d="M665 210 L810 230"/>
    <!-- users -> favorites -->
    <path d="M150 330 L165 430"/>
    <!-- favorites -> recipes -->
    <path d="M270 500 C360 540, 400 560, 435 600"/>
    <!-- users -> ratings -->
    <path d="M140 330 C110 430, 120 520, 150 580"/>
    <!-- ratings -> recipes -->
    <path d="M270 640 L435 650"/>
    <!-- users -> scheduled_meals -->
    <path d="M175 330 C230 550, 300 680, 360 720"/>
    <!-- scheduled_meals -> recipes -->
    <path d="M475 720 C490 700, 510 700, 520 730"/>
    <!-- recipes -> recipe_ingredients -->
    <path d="M665 620 L810 620"/>
    <!-- recipe_ingredients -> ingredients -->
    <path d="M930 560 C930 460, 928 380, 925 330"/>
  </g>

  <!-- crow's foot-ish markers (∞ labels) -->
  <g font-size="13" fill="#555">
    <text x="420" y="200">∞</text>
    <text x="672" y="228">∞</text>
    <text x="155" y="420">∞</text>
    <text x="420" y="605">∞</text>
    <text x="150" y="570">∞</text>
    <text x="420" y="648">∞</text>
    <text x="345" y="716">∞</text>
    <text x="527" y="723">∞</text>
    <text x="795" y="620">∞</text>
    <text x="912" y="335">∞</text>
  </g>

  <text x="550" y="140" font-size="12" fill="#888" text-anchor="middle">Blue = user-facing entities · Green = catalog · Orange = recipes · Purple = join tables (resolve many-to-many)</text>
</svg>
